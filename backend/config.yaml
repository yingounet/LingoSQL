server:
  port: 3366
  mode: debug # debug, release

database:
  path: ./data/lingosql.db

jwt:
  secret: your-secret-key-change-in-production
  expires_in: 24h # access token
  refresh_expires_in: 168h # 7 days

encryption:
  key: abcdefghijklmnopqrstuvwxyz123456

log:
  level: info # debug, info, warn, error
  format: json # json, text

cors:
  allowed_origins:
    - "*"

rate_limit:
  enabled: false
  default_rpm: 120
  polling_rpm: 30

# MCP 配置（Model Context Protocol，供 Cursor 等 IDE 通过 HTTP 连接）
mcp:
  enabled: true  # 是否启用 MCP HTTP 端点，Docker 部署建议开启

# 备份配置
backup:
  root_path: ./data/backups      # 备份存储目录，Docker 可挂载卷
  max_file_size_mb: 100          # 单文件最大大小（MB），0 表示不拆分
